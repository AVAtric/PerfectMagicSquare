name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            binary: PerfectMagicSquare
            archive: tar.gz
          - name: macos-arm64
            os: macos-latest
            binary: PerfectMagicSquare
            archive: tar.gz
          - name: windows-x86_64
            os: windows-latest
            binary: PerfectMagicSquare.exe
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OpenMP (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          EXTRA=""
          if [ "${{ runner.os }}" = "macOS" ]; then
            EXTRA="-DOpenMP_ROOT=$(brew --prefix libomp)"
          fi
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release $EXTRA

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release --target PerfectMagicSquare

      - name: Stage artifacts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/PerfectMagicSquare-${{ matrix.name }}
          cp build/bin/${{ matrix.binary }} dist/PerfectMagicSquare-${{ matrix.name }}/
          cp README.md LICENSE dist/PerfectMagicSquare-${{ matrix.name }}/
          tar -czvf PerfectMagicSquare-${{ matrix.name }}.tar.gz -C dist PerfectMagicSquare-${{ matrix.name }}

      - name: Stage artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "dist/PerfectMagicSquare-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "build/bin/Release/${{ matrix.binary }}" $stage
          Copy-Item README.md, LICENSE $stage
          Compress-Archive -Path $stage -DestinationPath "PerfectMagicSquare-${{ matrix.name }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PerfectMagicSquare-${{ matrix.name }}
          path: PerfectMagicSquare-${{ matrix.name }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
